<html>
    <head>
        <title>Application Form</title>
    </head>

<body>

    <h1>Application Form</h1>

    <form>

        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="fname">
        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname">
        <br><br>

        <label for="bdate">Date of birth:</label>
        <input type="date" id="bdate" name="bdate">
        <label for="age">Age:</label>
        <input type="number" id="age" name="age">
        <br><br>

        <label for="gen">Geneder:</label>
        <select>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="other">other</option>
        </select>

        <label for="mail">Email Address:</label>
        <input type="email" id="mail" name="mail" placeholder="Enter email address">
        <br><br>

        <label for="pose">Position Available:</label>
        <input type="radio" id="junior" name="pose">
        <label for="junior">Junior Developer</label>
        <input type="radio" id="mid-developer" name="pose">
        <label for="mid-developer">Mid-level Developer</label>
        <input type="radio" id="senior" name="pose">
        <label for="senior">Senior Developer</label>
        <br><br>

        <label for="plang">Programming Languages:</label>
        <input type="checkbox" id="java" name="plang">
        <label for="java">Java</label>
        <input type="checkbox" id="js" name="plang">
        <label foe="js">JavaScript</label>
        <input type="checkbox" id="py" name="plang">
        <label for="py">Python</label>
        <br><br>

        <label for="pass">Password:</label>
        <input type="password" id="pass" name="pass">
        <label for="cpass">Confirm Password:</label>
        <input type="password" id="cpass" name="cpass">
        <br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
