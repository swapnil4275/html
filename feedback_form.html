<html>
    <head>
        <title>Feedback Form</title>
    </head>

    <body>

        <h1>My Feedback Form</h1>

        <form>

            <ul>
                <li>
                    <label for="fname">Name:</label>
                    <input type="text" id="fname" name="fname">
                </li>

                <li>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email">
                </li>

                <li>
                    <label for="pass">Password:</label>
                    <input type="password" id="pass" name="pass">
                </li>
                <br>

                <li>
                    <label for="emo">Please check all the emotions that apply to you:</label>
                    <ul>
                        <li>
                            <label for="angry">Angry</label>
                            <input type="checkbox" id="angry" name="emo">
                        </li>
                        <li>
                            <label for="sad">Sad</label>
                            <input type="checkbox" id="sad" name="emo">
                        </li>
                        <li>
                            <label for="happy">happy</label>
                            <input type="checkbox" id="happy" name="emo">
                        </li>
                        <li>
                            <label for="amv">Ambivalent</label>
                            <input type="checkbox" id="amv" name="emo">
                        </li>
                    </ul>
                </li>


                <li>
                    <label for="satisfied">How satisfied were you with our service?</label>
                    <ul>
                        <li>
                            <label for="very_sat">Very satisfied</label>
                            <input type="radio" id="very_sat" name="satisfied">
                        </li>
                        <li>
                            <label for="sat">Satisfied</label>
                            <input type="radio" id="sat" name="satisfied">
                        </li>
                        <li>
                            <label for="didn_care">Didn't care</label>
                            <input type="radio" id="didn_care" name="satisfied">
                        </li>
                        <li>
                            <label for="dis_sat">Dissatisfied</label>
                            <input type="radio" id="dis_sat" name="satisfied">
                        </li>
                        <li>
                            <label for="very_dis_sat">Very dissatisfied</label>
                            <input type="radio" id="very_dis_sat" name="satisfied">
                        </li>
                    </ul>
                </li>
                <br>

                <li>
                    <label for="f_cmt">Further commnets:</label>
                    <textarea rows="4" cols="30"></textarea>
                </li>
                <br>

                <li>
                    <label for="bio_pic">Bio photo:</label>
                    <input type="file" id="bio_pic" name="bio_pic">
                </li>
                
                <li>
                    <label for="loc_visit">Location visited:</label>
                    <select>
                        <option selected>select location</option>
                        <option value="kolhapur">kolhapur</option>
                        <option value="sangli">sangli</option>
                        <option value="satara">satara</option>
                    </select>
                </li>

                <br><br>
                
                <li>
                    <input type="submit" value="Submit">
                </li>

            </ul>

        </form>
    </body>
</html>
