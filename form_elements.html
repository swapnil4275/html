<html>
    <head>
        <title>Form_Elements Web Page</title>
    </head>
    <body>
        <form>

            <!-- input Form_Element -->
            <h3>input form_element</h3>
            <input type="text" name="elem"><br><br>
            <input type="submit" value="submit">

            <!-- label Form_Element -->
            <h3>label form_element</h3>
            <label for="elem">S_name:</label>
            <input type="text" id="elem" name="elem">

            <!-- select Form_Element -->
            <h3>select form_element</h3>
            <label for="player">select Fav Player:</label>
            <select id="player" name="player">
                <option value="neymar">neymar</option>
                <option value="messi">messi</option>
                <option value="ronaldo">ronaldo</option>
                <option value="mbbappe">mbbappe</option>
            </select>

            <!-- option Form_Element -->
            <h3>option form_element</h3>
            <label for="opp">select Fav team:</label>
            <select id="opp" name="opp">
                <option value="barca">barca</option>
                <option value="madrid">madrid</option>
                <option value="mancity">mancity</option>
            </select>

            <!-- size Form_Element -->
            <h3>size form_element</h3>
            <label for="player">select Fav Player:</label>
            <select id="player" name="player" size="3">
                <option value="neymar">neymar</option>
                <option value="messi">messi</option>
                <option value="ronaldo">ronaldo</option>
                <option value="mbbappe">mbbappe</option>
            </select>

            <!-- multiple Form_Element -->
            <h3>multiple form_element</h3>
            <label for="mul">select Fav team:</label>
            <select id="mul" name="mul" multiple>
                <option value="barca">barca</option>
                <option value="madrid">madrid</option>
                <option value="mancity">mancity</option>
                <option value="paris">paris</option>
            </select>

            <!--textarea form_element-->
            <h3>textarea form_element</h3>
            <textarea name="msg" rows="10" cols="40"></textarea><br>
            <input type="submit">

            <!-- button form_element -->
            <h3>button form_element</h3>
            <button type="button" onclick="alert('Hello World!')">click here!</button>

            <!-- fieldset form_element -->
            <h3>fieldset form_element</h3>
            <fieldset>
                <legend>personal_info</legend>
                <label for="fname">First_Name:-</label>
                <input type="text" id="fname" name="fname"><br>
                <label for="lname">Last_Name:-</label>
                <input type="text" id="lname" name="lname"><br>
                <label for="mail">Email:-</label>
                <input type="email" id="mail" name="mail"><br>
                <input type="submit">
            </fieldset>

            <!-- datalist form_element -->
            <h3>datalist form_element</h3>
            <label for="plist">players_list:</label>
            <input list="plist" name="plist">
            <datalist id="plist">
                <option value="Rohit Sharma">
                <option value="Virat Kohli">
                <option value="Hardik Pandey">
            </datalist>


        </form>
    </body>
</html>
