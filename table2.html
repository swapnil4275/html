<html>
    <head>
        <title>Table Tags Web Page</title>
    </head>
    <body>

        <!-- used tags = table, tr, th, td
                       = caption, thead, tbody, tfoot  -->

        <table>
            <caption>Student Marks</caption>

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Subject</th>
                    <th>Marks</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Swapnil</td>
                    <td>science</td>
                    <td>94</td>
                </tr>

                <tr>
                    <td>Rahul</td>
                    <td>CS</td>
                    <td>96</td>
                </tr>
            </tbody>

            <tfoot>
                <tr>
                    <td>Total students</td>
                    <td>2</td>
                </tr>
            </tfoot>

        </table>

    </body>
</html>
